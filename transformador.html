<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformação de Cargos e Funções - TJPE</title>
    <style>
        :root {
            --primary: #204b7b;       /* Azul Petróleo TJPE */
            --primary-dark: #163354;
            --success: #2e7d32;       /* Verde para saldo positivo */
            --danger: #c62828;        /* Vermelho para déficit */
            --bg-light: #f4f6f9;
            --card-bg: #ffffff;
            --border-color: #cfd8dc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            padding: 30px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--bg-light);
            padding-bottom: 20px;
        }

        .header h1 {
            color: var(--primary);
            margin: 0;
            font-size: 26px;
            font-weight: 800;
        }

        .header p {
            color: #666;
            margin: 5px 0 0 0;
            font-size: 14px;
        }

        /* Grid de Simulação */
        .simulador-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 25px;
        }

        @media (max-width: 850px) {
            .simulador-grid {
                grid-template-columns: 1fr;
            }
        }

        .painel {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            background: #fafafa;
            display: flex;
            flex-direction: column;
        }

        .painel-origem { border-top: 5px solid var(--danger); }
        .painel-destino { border-top: 5px solid var(--success); }

        .painel h2 {
            margin-top: 0;
            font-size: 18px;
            color: var(--primary-dark);
            margin-bottom: 15px;
        }

        .lista-linhas {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
        }

        .linha-cargo {
            display: grid;
            grid-template-columns: 80px 1fr 40px;
            gap: 10px;
            align-items: center;
        }

        select, input[type="number"] {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
            width: 100%;
        }

        .btn-remover {
            background: #e57373;
            color: white;
            border: none;
            border-radius: 8px;
            height: 38px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-remover:hover {
            background: #d32f2f;
        }

        .btn-adicionar {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
            margin-top: auto;
        }

        .btn-adicionar:hover {
            background: var(--primary-dark);
        }

        /* Painel de Resultados */
        .resultado-box {
            background: var(--primary-dark);
            color: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        .resultado-valores {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        @media (max-width: 550px) {
            .resultado-valores {
                grid-template-columns: 1fr;
            }
        }

        .valor-card {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 8px;
        }

        .valor-card span {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .valor-card strong {
            font-size: 16px;
        }

        .saldo-status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
        }

        .status-positivo { background-color: var(--success); color: white; }
        .status-negativo { background-color: var(--danger); color: white; }

        .btn-voltar {
            display: inline-block;
            margin-top: 10px;
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-voltar:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Transformação de Cargos e Funções</h1>
        <p>DGF • NUGOV • TJPE</p>
    </div>

    <div class="simulador-grid">
        <div class="painel painel-origem">
            <h2>Cargos/Funções a Extinguir (-)</h2>
            <div id="container-origem" class="lista-linhas">
                </div>
            <button class="btn-adicionar" onclick="adicionarLinha('origem')">+ Adicionar Cargo</button>
        </div>

        <div class="painel painel-destino">
            <h2>Cargos/Funções a Criar (+)</h2>
            <div id="container-destino" class="lista-linhas">
                </div>
            <button class="btn-adicionar" onclick="adicionarLinha('destino')">+ Adicionar Cargo</button>
        </div>
    </div>

    <div class="resultado-box">
        BALANÇO FINANCEIRO DA PROPOSTA
        <div class="resultado-valores">
            <div class="valor-card">
                <span>Crédito (Extintos)</span>
                <strong id="val-credito">R$ 0,00</strong>
            </div>
            <div class="valor-card">
                <span>Custo (Novos)</span>
                <strong id="val-custo">R$ 0,00</strong>
            </div>
            <div class="valor-card">
                <span>Saldo Líquido</span>
                <strong id="val-saldo">R$ 0,00</strong>
            </div>
        </div>
        <div id="status-mensagem" class="saldo-status status-positivo" style="display: none;">
            --
        </div>
    </div>

    <div style="text-align: left;">
        <a href="index.html" class="btn-voltar">← Voltar ao Portal Principal</a>
    </div>
</div>
